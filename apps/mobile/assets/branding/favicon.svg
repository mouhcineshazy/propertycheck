  <!-- Property - dark color -->
  <text x="16" y="13" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="5" font-weight="700" fill="#0f172a">Property</text>

  <!-- Check - blue color, larger and bolder to match Property length -->
